{% extends "layout.html" %}

{% block content %}
<h2>Prediction Dashboard</h2>

<div class="card">
    <form method="POST">
        <input name="temperature" placeholder="Temperature" required>
        <input name="humidity" placeholder="Humidity" required>
        <input name="moisture" placeholder="Moisture" required>
        <input name="ph" placeholder="pH" required>
        <input name="light" placeholder="Light Hours" required>
        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction }}</h3>

    {% if confidence %}
        <h4>Confidence: {{ confidence }}%</h4>
    {% endif %}
</div>
{% endblock %}
