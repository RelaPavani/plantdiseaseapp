{% extends "layout.html" %}

{% block content %}

<h2>Upload Excel File 📊</h2>

<div class="card">
    <!-- File Upload Form -->
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <button type="submit">Upload & Analyze</button>
    </form>

    {% if total is defined %}
        <h3>Prediction Summary 🌱</h3>
        <p><b>Total Plants:</b> {{ total }}</p>
        <p><b>Healthy Plants:</b> {{ healthy }} ({{ healthy_percent }}%)</p>
        <p><b>Diseased Plants:</b> {{ diseased }} ({{ diseased_percent }}%)</p>

        <!-- Chart container with data attributes -->
        <div id="chart-data"
             data-healthy="{{ healthy }}"
             data-diseased="{{ diseased }}">
        </div>

        <!-- Pie Chart -->
        <canvas id="pieChart" width="300" height="300"></canvas>

        <!-- Bar Chart -->
        <canvas id="barChart" width="400" height="300"></canvas>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script>
            // Read data from the div attributes
            const chartDiv = document.getElementById("chart-data");
            const healthy = parseInt(chartDiv.dataset.healthy);
            const diseased = parseInt(chartDiv.dataset.diseased);

            // PIE CHART
            new Chart(document.getElementById("pieChart"), {
                type: "pie",
                data: {
                    labels: ["Healthy Plants", "Diseased Plants"],
                    datasets: [{
                        data: [healthy, diseased],
                        backgroundColor: ['#2e7d32', '#c62828']
                    }]
                }
            });

            // BAR CHART
            new Chart(document.getElementById("barChart"), {
                type: "bar",
                data: {
                    labels: ["Healthy Plants", "Diseased Plants"],
                    datasets: [{
                        label: "Plant Count",
                        data: [healthy, diseased],
                        backgroundColor: ['#2e7d32', '#c62828']
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true,
                            precision: 0
                        }
                    }
                }
            });
        </script>
    {% endif %}
</div>

{% endblock %}
